<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ຕັ້ງຄ່າຂໍ້ມູນພື້ນຖານ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Noto Sans Lao', sans-serif; background-color: #f8fafc; } </style>
</head>
<body class="flex min-h-screen">

    <!-- Sidebar ຈະມາສະແດງຢູ່ນີ້ -->
    <div id="sidebar-container" class="w-64 flex-shrink-0"></div>

    <!-- ເນື້ອໃນຫຼັກ -->
    <main class="flex-1 p-8 ml-64">
        <h1 class="text-2xl font-bold text-slate-800 mb-2">ຕັ້ງຄ່າຂໍ້ມູນພື້ນຖານ (Master Data)</h1>
        <p class="text-slate-500 mb-8">ຈັດການຂໍ້ມູນໝວດໝູ່, ປະເພດອຸປະກອນ ແລະ ຂໍ້ມູນຫຼັກໃນລະບົບ</p>
        
        <!-- ໂຄງສ້າງ 4 ກາດທີ່ເຮົາສ້າງໄວ້ -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- ກາດ 1: ໝວດໝູ່ອຸປະກອນ -->
            <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center text-blue-600 mb-4">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                </div>
                <h3 class="text-lg font-bold text-slate-800 mb-1">ໝວດໝູ່ອຸປະກອນ</h3>
                <p class="text-sm text-slate-500 mb-4">ເພີ່ມ/ລຶບ ປະເພດເຄື່ອງມືໃນສາງ</p>
                <button class="w-full py-2 bg-slate-50 text-slate-700 font-medium rounded-lg border border-slate-200 hover:bg-slate-100 transition-colors">ຈັດການ</button>
            </div>
        </div>
    </main>

    <!-- ສູດສຳເລັດ: ດຶງໂຄ້ດ Sidebar -->
    <script src="/js/components/sidebar.js"></script>
</body>
</html>
