<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ຈັດການຜູ້ໃຊ້ລະບົບ - Water Meter System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Lao', sans-serif; background-color: #f8fafc; }
        .page-animate { animation: pageEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes pageEnter { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .modal-backdrop { animation: fadeInBg 0.3s ease-out forwards; }
        @keyframes fadeInBg { from { opacity: 0; backdrop-filter: blur(0px); } to { opacity: 1; backdrop-filter: blur(8px); } }
        .modal-animate { animation: smoothPop 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes smoothPop { from { opacity: 0; transform: scale(0.95) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    </style>
</head>
<body class="flex min-h-screen relative overflow-x-hidden">

    <!-- Sidebar Container -->
    <div id="sidebar-container" class="w-64 flex-shrink-0 z-50 relative"></div>
    <script src="../../js/components/sidebar.js" defer></script>
    <!-- 🟢 ເອີ້ນໃຊ້ Auth Guard ເພື່ອປ້ອງກັນໜ້າເວັບ 🟢 -->
    <script type="module" src="../../js/components/auth-guard.js"></script>

    <!-- Main Content -->
    <main class="flex-1 p-8 ml-64 overflow-y-auto space-y-6 page-animate">
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 pb-2 border-b border-slate-200">
            <div>
                <h2 class="text-3xl font-extrabold text-slate-800 tracking-wide mb-1">ຈັດການຜູ້ໃຊ້ລະບົບ</h2>
                <p class="text-slate-500 text-sm font-medium">ເພີ່ມ, ແກ້ໄຂ ແລະ ກຳນົດສິດທິຜູ້ໃຊ້ງານ</p>
            </div>
            <button onclick="toggleModal('userModal', true)" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold py-2.5 px-5 rounded-xl shadow-lg active:scale-95 transition-all flex items-center relative z-10">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
                ເພີ່ມຜູ້ໃຊ້ໃໝ່
            </button>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden relative z-0">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse whitespace-nowrap">
                    <thead>
                        <tr class="bg-slate-50/80 border-b border-slate-100 text-slate-500 text-[11px] uppercase tracking-wider">
                            <th class="p-4 font-extrabold">ຊື່ ແລະ ຂໍ້ມູນ</th>
                            <th class="p-4 font-extrabold">ອີເມວ</th>
                            <th class="p-4 font-extrabold text-center">ສິດທິ</th>
                            <th class="p-4 font-extrabold text-center">ສະຖານະ</th>
                            <th class="p-4 font-extrabold text-center">ຈັດການ</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody" class="divide-y divide-slate-50 text-sm text-slate-700">
                        <tr><td colspan="5" class="p-8 text-center text-slate-400">ກຳລັງໂຫຼດຂໍ້ມູນ...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal ສຳລັບເພີ່ມຜູ້ໃຊ້ -->
    <div id="userModal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-md z-50 flex items-center justify-center p-4 modal-backdrop">
        <div class="bg-white rounded-2xl w-full max-w-lg shadow-2xl modal-animate border border-slate-200 overflow-hidden">
            <div class="bg-slate-800 p-5 text-white flex justify-between items-center font-bold text-lg">
                <h3>ເພີ່ມຜູ້ໃຊ້ໃໝ່</h3>
                <button onclick="toggleModal('userModal', false)" class="hover:text-rose-400">✕</button>
            </div>
            <div class="p-6 space-y-4">
                <input type="text" id="newUserName" placeholder="ຊື່ ແລະ ນາມສະກຸນ" class="w-full p-3 border border-slate-300 rounded-xl text-sm outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                <input type="email" id="newUserEmail" placeholder="ອີເມວ" class="w-full p-3 border border-slate-300 rounded-xl text-sm outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                <input type="password" id="newUserPwd" placeholder="ລະຫັດຜ່ານ" class="w-full p-3 border border-slate-300 rounded-xl text-sm outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                <select id="newUserRole" class="w-full p-3 border border-slate-300 rounded-xl text-sm font-bold bg-slate-50 outline-none focus:border-indigo-500">
                    <option value="user">ພະນັກງານ (User)</option>
                    <option value="admin">ແອດມິນ (Admin)</option>
                </select>
            </div>
            <div class="bg-slate-50 p-4 border-t border-slate-200 flex justify-end space-x-3">
                <button onclick="toggleModal('userModal', false)" class="px-5 py-2.5 rounded-xl font-bold text-slate-600 bg-white border border-slate-300 hover:bg-slate-50 text-sm">ຍົກເລີກ</button>
                <button id="btnSaveUser" onclick="saveUserToFirestore()" class="px-5 py-2.5 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-700 text-sm">ບັນທຶກຜູ້ໃຊ້</button>
            </div>
        </div>
    </div>

    <!-- Script ສຳລັບ Firebase -->
    <script type="module">
        import { db } from '../../firebase-config.js';
        // 🟢 ເພີ່ມ doc, updateDoc, deleteDoc ເຂົ້າມາ 🟢
        import { collection, addDoc, getDocs, doc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        async function loadUsersFromFirestore() {
            const tableBody = document.getElementById('userTableBody');
            try {
                const querySnapshot = await getDocs(collection(db, "users"));
                tableBody.innerHTML = '';
                
                if (querySnapshot.empty) {
                    tableBody.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-slate-400">ຍັງບໍ່ມີຂໍ້ມູນຜູ້ໃຊ້ໃນລະບົບ</td></tr>';
                    return;
                }

                querySnapshot.forEach((document) => {
                    const user = document.data();
                    const docId = document.id; // ດຶງ ID ຂອງແຖວນັ້ນໆ
                    
                    const fullName = user.fullName || 'No Name';
                    const email = user.email || 'No Email';
                    const role = user.role || 'user';
                    const firstChar = fullName.charAt(0).toUpperCase();
                    const isAdmin = role === 'admin';

                    const tr = document.createElement('tr');
                    tr.className = 'hover:bg-slate-50 transition-colors duration-150';
                    tr.innerHTML = `
                        <td class="p-4"><div class="flex items-center"><div class="w-10 h-10 rounded-full ${isAdmin ? 'bg-amber-500' : 'bg-blue-900'} text-white flex items-center justify-center font-bold mr-3 shadow-inner">${firstChar}</div><div><p class="font-bold text-slate-800">${fullName}</p></div></div></td>
                        <td class="p-4 font-bold text-indigo-600">${email}</td>
                        <td class="p-4 text-center"><span class="px-3 py-1.5 ${isAdmin ? 'bg-amber-100 text-amber-700 border-amber-200' : 'bg-slate-100 text-slate-600 border-slate-200'} rounded-full text-[11px] font-extrabold uppercase tracking-wide border">${isAdmin ? 'Admin' : 'User'}</span></td>
                        <td class="p-4 text-center"><span class="px-2.5 py-1 bg-emerald-50 text-emerald-600 rounded-lg text-xs font-bold border border-emerald-100">Active</span></td>
                        <td class="p-4 text-center">
                            <!-- ປຸ່ມປ່ຽນສິດທິ -->
                            <button onclick="toggleRole('${docId}', '${role}')" class="p-2 mr-1 bg-indigo-50 text-indigo-600 rounded-lg hover:bg-indigo-500 hover:text-white transition-colors active:scale-95 shadow-sm" title="ປ່ຽນສິດທິ">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
                            </button>
                            <!-- ປຸ່ມລຶບ -->
                            <button onclick="deleteUser('${docId}')" class="p-2 bg-rose-50 text-rose-600 rounded-lg hover:bg-rose-500 hover:text-white transition-colors active:scale-95 shadow-sm" title="ລຶບຜູ້ໃຊ້">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (e) { 
                console.error("Firebase Error:", e); 
            }
        }

        // 🟢 ຟັງຊັນປ່ຽນສິດທິ (Toggle Role) 🟢
        window.toggleRole = async function(docId, currentRole) {
            const newRole = currentRole === 'admin' ? 'user' : 'admin';
            const msg = newRole === 'admin' 
                ? "ທ່ານຕ້ອງການເລື່ອນຂັ້ນຜູ້ໃຊ້ນີ້ໃຫ້ເປັນ 'Admin' ແທ້ບໍ່?" 
                : "ທ່ານຕ້ອງການປົດສິດທິຜູ້ໃຊ້ນີ້ລົງເປັນ 'User' ທຳມະດາແທ້ບໍ່?";
                
            if(confirm(msg)) {
                try {
                    const userRef = doc(db, "users", docId);
                    await updateDoc(userRef, { role: newRole });
                    loadUsersFromFirestore(); // ໂຫຼດຕາຕະລາງໃໝ່ທັນທີ
                } catch (error) {
                    console.error("Error updating role:", error);
                    alert("ເກີດຂໍ້ຜິດພາດໃນການປ່ຽນສິດທິ!");
                }
            }
        }

        // 🟢 ຟັງຊັນລຶບຜູ້ໃຊ້ 🟢
        window.deleteUser = async function(docId) {
            if(confirm("ທ່ານຕ້ອງການລຶບຜູ້ໃຊ້ນີ້ອອກຈາກລະບົບແທ້ບໍ່?\n(ຂໍ້ມູນຈະບໍ່ສາມາດກູ້ຄືນໄດ້)")) {
                try {
                    await deleteDoc(doc(db, "users", docId));
                    loadUsersFromFirestore();
                } catch (error) {
                    console.error("Error deleting user:", error);
                    alert("ເກີດຂໍ້ຜິດພາດໃນການລຶບຜູ້ໃຊ້!");
                }
            }
        }

        window.saveUserToFirestore = async function() {
            const btn = document.getElementById('btnSaveUser');
            const name = document.getElementById('newUserName').value;
            const email = document.getElementById('newUserEmail').value;
            
            if(!name || !email) {
                alert("ກະລຸນາປ້ອນຊື່ ແລະ ອີເມວໃຫ້ຄົບຖ້ວນ!");
                return;
            }

            const data = {
                fullName: name,
                email: email,
                role: document.getElementById('newUserRole').value,
                createdAt: serverTimestamp()
            };
            
            btn.disabled = true;
            btn.innerHTML = 'ກຳລັງບັນທຶກ...';

            try {
                await addDoc(collection(db, "users"), data);
                document.getElementById('newUserName').value = '';
                document.getElementById('newUserEmail').value = '';
                document.getElementById('newUserPwd').value = '';
                toggleModal('userModal', false);
                loadUsersFromFirestore();
            } catch (e) {
                console.error("Error adding document: ", e);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'ບັນທຶກຜູ້ໃຊ້';
            }
        }

        window.toggleModal = (id, show) => document.getElementById(id).classList.toggle('hidden', !show);
        document.addEventListener('DOMContentLoaded', loadUsersFromFirestore);
    </script>
</body>
</html>
