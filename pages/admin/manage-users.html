<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ຈັດການຜູ້ໃຊ້ລະບົບ - Water Meter System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Lao', sans-serif; background-color: #f8fafc; }
        .page-animate { animation: pageEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes pageEnter { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .modal-backdrop { animation: fadeInBg 0.3s ease-out forwards; }
        @keyframes fadeInBg { from { opacity: 0; backdrop-filter: blur(0px); } to { opacity: 1; backdrop-filter: blur(8px); } }
        .modal-animate { animation: smoothPop 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes smoothPop { from { opacity: 0; transform: scale(0.95) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .custom-checkbox { width: 1.25rem; height: 1.25rem; accent-color: #4f46e5; cursor: pointer; }
    </style>
</head>
<body class="flex min-h-screen relative overflow-x-hidden">

    <!-- Sidebar & Auth Guard -->
    <div id="sidebar-container" class="w-64 flex-shrink-0 z-50 relative"></div>
    <script src="../../js/components/sidebar.js" defer></script>
    <script type="module" src="../../js/components/auth-guard.js"></script>

    <!-- Main Content -->
    <main class="flex-1 p-8 ml-64 overflow-y-auto space-y-6 page-animate">
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 pb-2 border-b border-slate-200">
            <div>
                <h2 class="text-3xl font-extrabold text-slate-800 tracking-wide mb-1">ຈັດການຜູ້ໃຊ້ລະບົບ</h2>
                <p class="text-slate-500 text-sm font-medium">ຄວບຄຸມສິດທິ, ການເຂົ້າເຖິງໜ້າວຽກ, ລະຫັດຜ່ານ ແລະ ຕິດຕາມການນຳໃຊ້</p>
            </div>
            <button onclick="openModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold py-2.5 px-5 rounded-xl shadow-lg active:scale-95 transition-all flex items-center relative z-10">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
                ເພີ່ມຜູ້ໃຊ້ໃໝ່
            </button>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden relative z-0">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse whitespace-nowrap">
                    <thead>
                        <tr class="bg-slate-50/80 border-b border-slate-100 text-slate-500 text-[11px] uppercase tracking-wider">
                            <th class="p-4 font-extrabold">ຊື່ ແລະ ຂໍ້ມູນ</th>
                            <th class="p-4 font-extrabold">ອີເມວ</th>
                            <th class="p-4 font-extrabold text-center">ລະຫັດຜ່ານ</th>
                            <th class="p-4 font-extrabold text-center">ສິດທິ (Role)</th>
                            <th class="p-4 font-extrabold text-center">ສະຖານະ</th>
                            <th class="p-4 font-extrabold text-center">ຈັດການ</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody" class="divide-y divide-slate-50 text-sm text-slate-700">
                        <tr><td colspan="6" class="p-8 text-center text-slate-400">ກຳລັງໂຫຼດຂໍ້ມູນ...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal ສຳລັບເພີ່ມ/ແກ້ໄຂຜູ້ໃຊ້ -->
    <div id="userModal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-md z-50 flex items-center justify-center p-4 modal-backdrop">
        <div class="bg-white rounded-2xl w-full max-w-lg shadow-2xl modal-animate border border-slate-200 overflow-hidden">
            <div class="bg-slate-800 p-5 text-white flex justify-between items-center font-bold text-lg">
                <h3 id="modalTitle">ເພີ່ມຜູ້ໃຊ້ໃໝ່</h3>
                <button onclick="closeModal()" class="hover:text-rose-400 transition-colors">✕</button>
            </div>
            
            <div class="p-6 space-y-4 max-h-[65vh] overflow-y-auto">
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1">ຊື່ ແລະ ນາມສະກຸນ <span class="text-rose-500">*</span></label>
                    <input type="text" id="newUserName" class="w-full p-3 border border-slate-300 rounded-xl text-sm outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1">ອີເມວ (ສຳລັບເຂົ້າລະບົບ) <span class="text-rose-500">*</span></label>
                    <input type="email" id="newUserEmail" class="w-full p-3 border border-slate-300 rounded-xl text-sm outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1">ລະຫັດຜ່ານ <span class="text-rose-500">*</span></label>
                    <input type="text" id="newUserPwd" class="w-full p-3 border border-slate-300 rounded-xl text-sm outline-none focus:border-indigo-500" placeholder="ກຳນົດລະຫັດຜ່ານໃໝ່...">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1">ຕຳແໜ່ງ (Role) <span class="text-rose-500">*</span></label>
                    <select id="newUserRole" class="w-full p-3 border border-slate-300 rounded-xl text-sm font-bold bg-slate-50 outline-none focus:border-indigo-500">
                        <option value="technical_staff">ພະນັກງານວິຊາການ</option>
                        <option value="warehouse_manager">ຜູ້ຈັດການສາງ</option>
                        <option value="section_head">ຫົວໜ້າພາກສ່ວນ</option>
                        <option value="department_head">ຫົວໜ້າພະແນກ</option>
                        <option value="system_manager">ຜູ້ຈັດການລະບົບ</option>
                    </select>
                </div>

                <div class="border-t border-slate-200 pt-4 mt-2">
                    <label class="block text-xs font-bold text-slate-600 mb-3">ກຳນົດສິດການເຂົ້າເຖິງໜ້າວຽກ (Page Access) <span class="text-rose-500">*</span></label>
                    <div class="grid grid-cols-2 gap-3 bg-slate-50 p-4 rounded-xl border border-slate-100">
                        <label class="flex items-center space-x-2 cursor-pointer group">
                            <input type="checkbox" id="permDashboard" class="custom-checkbox border-slate-300 rounded">
                            <span class="text-sm text-slate-700 font-medium group-hover:text-indigo-600 transition-colors">ໜ້າຫຼັກ (Dashboard)</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer group">
                            <input type="checkbox" id="permInventory" class="custom-checkbox border-slate-300 rounded">
                            <span class="text-sm text-slate-700 font-medium group-hover:text-indigo-600 transition-colors">ສະຕັອກສິນຄ້າ</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer group">
                            <input type="checkbox" id="permReceive" class="custom-checkbox border-slate-300 rounded">
                            <span class="text-sm text-slate-700 font-medium group-hover:text-indigo-600 transition-colors">ຮັບເຄື່ອງເຂົ້າສາງ</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer group">
                            <input type="checkbox" id="permIssue" class="custom-checkbox border-slate-300 rounded">
                            <span class="text-sm text-slate-700 font-medium group-hover:text-indigo-600 transition-colors">ເບີກຈ່າຍອຸປະກອນ</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer group col-span-2 mt-2 pt-2 border-t border-slate-200">
                            <input type="checkbox" id="permManageUsers" class="custom-checkbox border-slate-300 rounded">
                            <span class="text-sm text-slate-700 font-bold group-hover:text-indigo-600 transition-colors">ຈັດການຜູ້ໃຊ້ (Admin Menu)</span>
                        </label>
                    </div>
                </div>

            </div>
            
            <div class="bg-slate-50 p-4 border-t border-slate-200 flex justify-end space-x-3">
                <button onclick="closeModal()" class="px-5 py-2.5 rounded-xl font-bold text-slate-600 bg-white border border-slate-300 hover:bg-slate-50 text-sm">ຍົກເລີກ</button>
                <button id="btnSaveUser" onclick="saveUserToFirestore()" class="px-5 py-2.5 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-700 text-sm flex items-center">
                    ບັນທຶກຂໍ້ມູນ
                </button>
            </div>
        </div>
    </div>

    <!-- Modal ບັນທຶກການເຄື່ອນໄຫວ (Audit Logs) -->
    <div id="logModal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-md z-50 flex items-center justify-center p-4 modal-backdrop">
        <div class="bg-white rounded-2xl w-full max-w-xl shadow-2xl modal-animate border border-slate-200 overflow-hidden flex flex-col max-h-[80vh]">
            <div class="bg-slate-100 p-4 border-b border-slate-200 flex justify-between items-center">
                <h3 class="font-extrabold text-slate-800 text-lg flex items-center">
                    <svg class="w-5 h-5 mr-2 text-indigo-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    ປະຫວັດການເຄື່ອນໄຫວ (<span id="logUserName" class="text-indigo-600">User</span>)
                </h3>
                <button onclick="closeLogModal()" class="text-slate-400 hover:text-rose-500 transition-colors">✕</button>
            </div>
            <div class="p-6 overflow-y-auto flex-1">
                <ul class="space-y-4 border-l-2 border-slate-200 ml-3 pl-4">
                    <li class="relative">
                        <span class="absolute -left-6 top-1 w-3.5 h-3.5 bg-emerald-500 border-2 border-white rounded-full"></span>
                        <p class="text-sm font-bold text-slate-700">ເຂົ້າສູ່ລະບົບ (Login)</p>
                        <p class="text-xs text-slate-500 mt-0.5">ມື້ນີ້, ເວລາ 08:30 ນາທີ</p>
                    </li>
                </ul>
                <p class="text-center text-xs text-slate-400 mt-6">* ນີ້ແມ່ນຂໍ້ມູນຈຳລອງການເຄື່ອນໄຫວລ່າສຸດ</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from '../../firebase-config.js';
        import { collection, addDoc, getDocs, doc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let currentEditId = null;

        async function loadUsersFromFirestore() {
            const tableBody = document.getElementById('userTableBody');
            try {
                const querySnapshot = await getDocs(collection(db, "users"));
                tableBody.innerHTML = '';
                
                if (querySnapshot.empty) {
                    tableBody.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-slate-400">ຍັງບໍ່ມີຂໍ້ມູນຜູ້ໃຊ້ໃນລະບົບ</td></tr>';
                    return;
                }

                querySnapshot.forEach((userDoc) => {
                    const user = userDoc.data();
                    const docId = userDoc.id; 
                    
                    const fullName = user.fullName || 'No Name';
                    const email = user.email || 'No Email';
                    const role = user.role || 'technical_staff';
                    const status = user.status || 'active';
                    const pwd = user.password || 'ບໍ່ໄດ້ຕັ້ງລະຫັດ';
                    
                    const firstChar = fullName.charAt(0).toUpperCase();

                    // ກຳນົດສີ ແລະ ຊື່ໃຫ້ແຕ່ລະຕຳແໜ່ງໃໝ່ທັງ 5
                    let roleDisplay = '';
                    let roleBg = '';
                    let avatarBg = '';

                    switch (role) {
                        case 'system_manager':
                            roleDisplay = 'ຜູ້ຈັດການລະບົບ';
                            roleBg = 'bg-rose-100 text-rose-700 border-rose-200';
                            avatarBg = 'bg-rose-600';
                            break;
                        case 'department_head':
                            roleDisplay = 'ຫົວໜ້າພະແນກ';
                            roleBg = 'bg-purple-100 text-purple-700 border-purple-200';
                            avatarBg = 'bg-purple-600';
                            break;
                        case 'section_head':
                            roleDisplay = 'ຫົວໜ້າພາກສ່ວນ';
                            roleBg = 'bg-amber-100 text-amber-700 border-amber-200';
                            avatarBg = 'bg-amber-500';
                            break;
                        case 'warehouse_manager':
                            roleDisplay = 'ຜູ້ຈັດການສາງ';
                            roleBg = 'bg-indigo-100 text-indigo-700 border-indigo-200';
                            avatarBg = 'bg-indigo-600';
                            break;
                        default: // technical_staff
                            roleDisplay = 'ພະນັກງານວິຊາການ';
                            roleBg = 'bg-slate-100 text-slate-700 border-slate-200';
                            avatarBg = 'bg-slate-700';
                    }

                    const statusDisplay = status === 'active' 
                        ? `<span class="px-2.5 py-1 bg-emerald-50 text-emerald-600 rounded-lg text-[11px] font-bold border border-emerald-200">ເປີດໃຊ້ງານ</span>`
                        : `<span class="px-2.5 py-1 bg-rose-50 text-rose-600 rounded-lg text-[11px] font-bold border border-rose-200">ຖືກໂຈະ</span>`;

                    const userJson = encodeURIComponent(JSON.stringify({id: docId, ...user}));

                    const tr = document.createElement('tr');
                    tr.className = `transition-colors duration-150 ${status === 'suspended' ? 'bg-slate-50 opacity-80' : 'hover:bg-slate-50'}`;
                    
                    tr.innerHTML = `
                        <td class="p-4"><div class="flex items-center"><div class="w-10 h-10 rounded-full ${avatarBg} text-white flex items-center justify-center font-bold mr-3 shadow-inner">${firstChar}</div><div><p class="font-bold text-slate-800">${fullName}</p></div></div></td>
                        <td class="p-4 font-bold text-slate-600">${email}</td>
                        <td class="p-4 text-center">
                            <div class="flex items-center justify-center space-x-2">
                                <span id="pwdText_${docId}" class="font-mono text-slate-400 tracking-widest text-lg">••••••••</span>
                                <button onclick="togglePwdView('${docId}', '${pwd}')" class="text-slate-400 hover:text-indigo-600 focus:outline-none" title="ເບິ່ງລະຫັດຜ່ານ">👁</button>
                            </div>
                        </td>
                        <td class="p-4 text-center"><span class="px-3 py-1.5 ${roleBg} rounded-full text-[11px] font-extrabold tracking-wide border">${roleDisplay}</span></td>
                        <td class="p-4 text-center">${statusDisplay}</td>
                        <td class="p-4 text-center">
                            <div class="flex justify-center space-x-2">
                                <button onclick="openLogModal('${fullName}')" class="p-2 bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 transition-colors shadow-sm" title="ເບິ່ງປະຫວັດ">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                </button>
                                <button onclick="editUser('${userJson}')" class="p-2 bg-indigo-50 text-indigo-600 rounded-lg hover:bg-indigo-500 hover:text-white transition-colors shadow-sm" title="ແກ້ໄຂ / ປ່ຽນລະຫັດ">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                                </button>
                                <button onclick="toggleStatus('${docId}', '${status}')" class="p-2 ${status === 'active' ? 'bg-amber-50 text-amber-600 hover:bg-amber-500 hover:text-white' : 'bg-emerald-50 text-emerald-600 hover:bg-emerald-500 hover:text-white'} rounded-lg transition-colors shadow-sm" title="${status === 'active' ? 'ໂຈະການນຳໃຊ້' : 'ເປີດນຳໃຊ້ຄືນ'}">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"></path></svg>
                                </button>
                            </div>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (e) { 
                console.error("Firebase Error:", e);
            }
        }

        window.togglePwdView = function(docId, realPwd) {
            const span = document.getElementById(`pwdText_${docId}`);
            if (span.innerText === '••••••••') {
                span.innerText = realPwd;
                span.classList.remove('text-slate-400', 'text-lg', 'tracking-widest');
                span.classList.add('text-indigo-600', 'text-sm');
            } else {
                span.innerText = '••••••••';
                span.classList.add('text-slate-400', 'text-lg', 'tracking-widest');
                span.classList.remove('text-indigo-600', 'text-sm');
            }
        }

        window.toggleStatus = async function(docId, currentStatus) {
            const newStatus = currentStatus === 'active' ? 'suspended' : 'active';
            const msg = newStatus === 'suspended' ? "ຕ້ອງການໂຈະຜູ້ໃຊ້ນີ້ບໍ່?" : "ຕ້ອງການເປີດນຳໃຊ້ບັນຊີນີ້ຄືນບໍ່?";
            if(confirm(msg)) {
                await updateDoc(doc(db, "users", docId), { status: newStatus });
                loadUsersFromFirestore();
            }
        }

        window.openModal = function() {
            currentEditId = null;
            document.getElementById('modalTitle').innerText = 'ເພີ່ມຜູ້ໃຊ້ໃໝ່';
            document.getElementById('newUserName').value = '';
            document.getElementById('newUserEmail').value = '';
            document.getElementById('newUserPwd').value = '';
            document.getElementById('newUserRole').value = 'technical_staff';
            
            document.getElementById('permDashboard').checked = true; 
            document.getElementById('permInventory').checked = false;
            document.getElementById('permReceive').checked = false;
            document.getElementById('permIssue').checked = false;
            document.getElementById('permManageUsers').checked = false;

            document.getElementById('userModal').classList.remove('hidden');
        }

        window.editUser = function(userJsonStr) {
            const user = JSON.parse(decodeURIComponent(userJsonStr));
            currentEditId = user.id;
            
            document.getElementById('modalTitle').innerText = 'ແກ້ໄຂຂໍ້ມູນຜູ້ໃຊ້';
            document.getElementById('newUserName').value = user.fullName;
            document.getElementById('newUserEmail').value = user.email;
            document.getElementById('newUserPwd').value = user.password || '';
            document.getElementById('newUserRole').value = user.role || 'technical_staff';
            
            const perms = user.permissions || {};
            document.getElementById('permDashboard').checked = perms.dashboard || false;
            document.getElementById('permInventory').checked = perms.inventory || false;
            document.getElementById('permReceive').checked = perms.receive || false;
            document.getElementById('permIssue').checked = perms.issue || false;
            document.getElementById('permManageUsers').checked = perms.manageUsers || false;

            document.getElementById('userModal').classList.remove('hidden');
        }

        window.closeModal = () => document.getElementById('userModal').classList.add('hidden');

        window.saveUserToFirestore = async function() {
            const btn = document.getElementById('btnSaveUser');
            const name = document.getElementById('newUserName').value;
            const email = document.getElementById('newUserEmail').value;
            const pwd = document.getElementById('newUserPwd').value;
            const role = document.getElementById('newUserRole').value;
            
            const permissions = {
                dashboard: document.getElementById('permDashboard').checked,
                inventory: document.getElementById('permInventory').checked,
                receive: document.getElementById('permReceive').checked,
                issue: document.getElementById('permIssue').checked,
                manageUsers: document.getElementById('permManageUsers').checked
            };

            if(!name || !email || !pwd) {
                alert("ກະລຸນາປ້ອນຂໍ້ມູນໃຫ້ຄົບຖ້ວນ (ລວມທັງລະຫັດຜ່ານ)!");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = 'ກຳລັງບັນທຶກ...';

            try {
                if (currentEditId) {
                    await updateDoc(doc(db, "users", currentEditId), {
                        fullName: name,
                        email: email,
                        password: pwd,
                        role: role,
                        permissions: permissions
                    });
                } else {
                    await addDoc(collection(db, "users"), {
                        fullName: name,
                        email: email,
                        password: pwd,
                        role: role,
                        permissions: permissions,
                        status: 'active',
                        createdAt: serverTimestamp()
                    });
                }
                closeModal();
                loadUsersFromFirestore();
            } catch (e) {
                console.error("Error saving document: ", e);
                alert("ເກີດຂໍ້ຜິດພາດໃນການບັນທຶກ!");
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'ບັນທຶກຂໍ້ມູນ';
            }
        }

        window.openLogModal = function(userName) {
            document.getElementById('logUserName').innerText = userName;
            document.getElementById('logModal').classList.remove('hidden');
        }
        window.closeLogModal = () => document.getElementById('logModal').classList.add('hidden');
        
        loadUsersFromFirestore();
    </script>
</body>
</html>
