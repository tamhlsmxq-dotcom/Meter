<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ຈັດການຜູ້ໃຊ້ລະບົບ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Lao', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- Sidebar Container -->
    <div id="sidebar-container"></div>

    <!-- Main Content -->
    <main class="flex-1 p-8 ml-64 overflow-y-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 pb-2 border-b border-slate-200 mb-6">
            <div>
                <h2 class="text-3xl font-extrabold text-slate-800 tracking-wide mb-1">ຈັດການຜູ້ໃຊ້ລະບົບ</h2>
                <p class="text-slate-500 text-sm font-medium">ເພີ່ມ, ແກ້ໄຂ ແລະ ກຳນົດສິດທິຜູ້ໃຊ້ງານ</p>
            </div>
            <button onclick="toggleModal('userModal', true)" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold py-2.5 px-5 rounded-xl shadow-lg active:scale-95 transition-all flex items-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
                ເພີ່ມຜູ້ໃຊ້ໃໝ່
            </button>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
            <table class="w-full text-left border-collapse whitespace-nowrap">
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-100 text-slate-500 text-[11px] uppercase tracking-wider">
                        <th class="p-4 font-extrabold">ຊື່ ແລະ ຂໍ້ມູນ</th>
                        <th class="p-4 font-extrabold">ອີເມວ</th>
                        <th class="p-4 font-extrabold text-center">ສິດທິ</th>
                        <th class="p-4 font-extrabold text-center">ສະຖານະ</th>
                        <th class="p-4 font-extrabold text-center">ຈັດການ</th>
                    </tr>
                </thead>
                <tbody id="userTableBody" class="divide-y divide-slate-50 text-sm text-slate-700">
                    <tr><td colspan="5" class="p-8 text-center text-slate-400">ກຳລັງໂຫຼດຂໍ້ມູນ...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal -->
    <div id="userModal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-md z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-lg shadow-2xl border border-slate-200">
            <div class="bg-slate-800 p-5 text-white flex justify-between items-center font-bold text-lg rounded-t-2xl">
                <h3>ເພີ່ມຜູ້ໃຊ້ໃໝ່</h3>
                <button onclick="toggleModal('userModal', false)" class="hover:text-rose-400">✕</button>
            </div>
            <div class="p-6 space-y-4">
                <input type="text" id="newUserName" placeholder="ຊື່ ແລະ ນາມສະກຸນ" class="w-full p-3 border border-slate-300 rounded-xl text-sm">
                <input type="email" id="newUserEmail" placeholder="ອີເມວ" class="w-full p-3 border border-slate-300 rounded-xl text-sm">
                <input type="password" id="newUserPwd" placeholder="ລະຫັດຜ່ານ" class="w-full p-3 border border-slate-300 rounded-xl text-sm">
                <select id="newUserRole" class="w-full p-3 border border-slate-300 rounded-xl text-sm font-bold bg-slate-50">
                    <option value="user">ພະນັກງານ (User)</option>
                    <option value="admin">ແອດມິນ (Admin)</option>
                </select>
            </div>
            <div class="bg-slate-50 p-4 border-t border-slate-200 flex justify-end space-x-3 rounded-b-2xl">
                <button onclick="toggleModal('userModal', false)" class="px-5 py-2.5 rounded-xl font-bold text-slate-600 bg-white border border-slate-300 text-sm">ຍົກເລີກ</button>
                <button id="btnSaveUser" onclick="saveUserToFirestore()" class="px-5 py-2.5 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-700 text-sm">ບັນທຶກຜູ້ໃຊ້</button>
            </div>
        </div>
    </div>

    <!-- Script -->
    <script src="../../js/components/sidebar.js"></script>
    <script type="module">
        import { db } from '../../js/firebase-config.js';
        import { collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        async function loadUsersFromFirestore() {
            const tableBody = document.getElementById('userTableBody');
            try {
                const q = query(collection(db, "users"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                tableBody.innerHTML = '';
                
                if (querySnapshot.empty) {
                    tableBody.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-slate-400">ຍັງບໍ່ມີຂໍ້ມູນ</td></tr>';
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const user = doc.data();
                    const isAdmin = user.role === 'admin';
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="p-4"><div class="flex items-center"><div class="w-10 h-10 rounded-full ${isAdmin ? 'bg-amber-500' : 'bg-blue-900'} text-white flex items-center justify-center font-bold mr-3">${user.fullName.charAt(0)}</div><div><p class="font-bold">${user.fullName}</p></div></div></td>
                        <td class="p-4 font-bold text-indigo-600">${user.email}</td>
                        <td class="p-4 text-center"><span class="px-3 py-1 ${isAdmin ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-600'} rounded-full text-xs font-bold">${isAdmin ? 'Admin' : 'User'}</span></td>
                        <td class="p-4 text-center">Active</td>
                        <td class="p-4 text-center"><button class="p-2 bg-rose-50 text-rose-600 rounded-lg">ລຶບ</button></td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (e) { console.error(e); }
        }

        window.saveUserToFirestore = async function() {
            const btn = document.getElementById('btnSaveUser');
            btn.disabled = true;
            await addDoc(collection(db, "users"), {
                fullName: document.getElementById('newUserName').value,
                email: document.getElementById('newUserEmail').value,
                role: document.getElementById('newUserRole').value,
                createdAt: serverTimestamp()
            });
            alert("ບັນທຶກສຳເລັດ");
            toggleModal('userModal', false);
            loadUsersFromFirestore();
            btn.disabled = false;
        }

        window.toggleModal = (id, show) => document.getElementById(id).classList.toggle('hidden', !show);
        window.onload = loadUsersFromFirestore;
    </script>
</body>
</html>
