<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <title>ຈັດການສິດທິຜູ້ໃຊ້</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Times New Roman', 'Phetsarath OT', serif; }</style>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-md">
        <h2 class="text-2xl font-bold mb-6">ຈັດການສິດທິຜູ້ໃຊ້</h2>
        <div class="grid grid-cols-1 gap-4">
            <div class="p-4 border rounded-lg bg-gray-50 flex gap-2">
                <input type="email" id="userEmail" placeholder="ອີເມວພະນັກງານ..." class="p-2 border rounded w-full">
                <select id="userRole" class="p-2 border rounded">
                    <option value="staff">ພະນັກງານ (Staff)</option>
                    <option value="admin">ຜູ້ບໍລິຫານ (Admin)</option>
                </select>
                <button onclick="addUserRole()" class="bg-blue-600 text-white px-4 py-2 rounded">ບັນທຶກ</button>
            </div>
            <table class="w-full mt-4">
                <thead class="bg-gray-200">
                    <tr><th class="p-2">ອີເມວ</th><th class="p-2">ສິດທິ</th><th class="p-2">ຈັດການ</th></tr>
                </thead>
                <tbody id="userListBody"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { db, collection, addDoc, getDocs, deleteDoc, doc } from './firebase-config.js';
        
        window.addUserRole = async function() {
            const email = document.getElementById('userEmail').value;
            const role = document.getElementById('userRole').value;
            await addDoc(collection(db, "users"), { email, role });
            location.reload();
        };

        async function loadUsers() {
            const snapshot = await getDocs(collection(db, "users"));
            const body = document.getElementById('userListBody');
            snapshot.forEach(doc => {
                const u = doc.data();
                body.innerHTML += `<tr><td class="p-2">${u.email}</td><td class="p-2">${u.role}</td>
                <td class="p-2"><button onclick="deleteUser('${doc.id}')" class="text-red-500">ລຶບ</button></td></tr>`;
            });
        }
        loadUsers();
    </script>
</body>
</html>
