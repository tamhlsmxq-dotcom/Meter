<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ເຂົ້າສູ່ລະບົບ - ສາງໝໍ້ແທກນ້ຳ</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e40af">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3256/3256114.png">
    
    <style>
        body, input, select, button, textarea { 
            font-family: 'Times New Roman', 'Phetsarath OT', 'Noto Sans Lao', serif !important; 
        }
        body { background-color: #f3f4f6; }
        .swal2-popup { 
            font-family: 'Times New Roman', 'Phetsarath OT', 'Noto Sans Lao', serif !important; 
        }
    </style>
</head>
<body class="bg-blue-50">
    <div class="min-h-screen flex items-center justify-center relative">
        <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md border-t-4 border-blue-600 relative overflow-hidden">
            
            <button id="installAppBtn" class="hidden absolute top-4 right-4 bg-green-100 text-green-700 hover:bg-green-200 px-3 py-1.5 rounded-full text-xs font-bold transition-colors border border-green-200 shadow-sm">
                <i class="fas fa-download mr-1"></i> ຕິດຕັ້ງແອັບ
            </button>

            <div class="text-center mb-6 mt-4">
                <i class="fas fa-tint text-4xl text-blue-600 mb-2"></i>
                <h1 class="text-2xl font-bold text-gray-800">ລະບົບເບີກຈ່າຍອຸປະກອນ</h1>
                <p class="text-gray-500 text-sm font-bold">ສາງຄຸ້ມຄອງໝໍ້ແທກນ້ຳ</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">ອີເມວ</label>
                    <input type="email" id="email" class="w-full p-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 font-bold" placeholder="admin@watermeter.com">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">ລະຫັດຜ່ານ</label>
                    <input type="password" id="password" class="w-full p-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 font-bold" placeholder="••••••••">
                </div>
                <button onclick="login()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition-colors mt-2 text-lg shadow-md">ເຂົ້າສູ່ລະບົບ</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, signInWithEmailAndPassword, onAuthStateChanged } from './firebase-config.js';

        // 1. ລົງທະບຽນ Service Worker ສຳລັບ PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('ServiceWorker ລົງທະບຽນສຳເລັດ!'))
                .catch(err => console.log('ServiceWorker ລົງທະບຽນຜິດພາດ: ', err));
            });
        }

        // 2. ຈັດການປຸ່ມ "ຕິດຕັ້ງແອັບ"
        let deferredPrompt;
        const installBtn = document.getElementById('installAppBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            // ປ້ອງກັນບໍ່ໃຫ້ Chrome ໂຊປັອບອັບເອງ ແຕ່ໃຫ້ໂຊປຸ່ມຂອງເຮົາແທນ
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.remove('hidden'); // ເປີດປຸ່ມໃຫ້ເຫັນ
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                // ໂຊປັອບອັບຖາມໃຫ້ຕິດຕັ້ງແອັບ
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                // ຖ້າຜູ້ໃຊ້ກົດຍອມຮັບ ໃຫ້ເຊື່ອງປຸ່ມນີ້ໄປ
                if (outcome === 'accepted') {
                    installBtn.classList.add('hidden');
                }
                deferredPrompt = null;
            }
        });

        // ຖ້າຕິດຕັ້ງແລ້ວ ໃຫ້ເຊື່ອງປຸ່ມ
        window.addEventListener('appinstalled', () => {
            installBtn.classList.add('hidden');
            console.log('ແອັບຖືກຕິດຕັ້ງສຳເລັດແລ້ວ');
        });

        // 3. ຈັດການການລັອກອິນ
        // ຖ້າເຄີຍລັອກອິນແລ້ວ ໃຫ້ຍ້າຍໄປໜ້າບັນທຶກ (record.html) ທັນທີ
        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = 'record.html';
        });

        // ເມື່ອກົດປຸ່ມເຂົ້າສູ່ລະບົບ
        window.login = async function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                Swal.fire({ title: 'ກຳລັງເຂົ້າສູ່ລະບົບ...', didOpen: () => { Swal.showLoading(); }});
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'record.html'; 
            } catch (error) {
                Swal.fire('ເຂົ້າສູ່ລະບົບບໍ່ສຳເລັດ', 'ກວດສອບອີເມວ ຫຼື ລະຫັດຜ່ານຄືນໃໝ່', 'error');
            }
        };
    </script>
</body>
</html>
