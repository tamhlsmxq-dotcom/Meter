<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ໜ້າຫຼັກ - Water Meter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Noto Sans Lao', sans-serif; background-color: #f8fafc; } </style>
</head>
<body class="flex min-h-screen">

    <!-- Sidebar ຈະມາສະແດງຢູ່ນີ້ -->
    <div id="sidebar-container" class="w-64 flex-shrink-0"></div>

    <!-- ເນື້ອໃນຫຼັກ -->
    <main class="flex-1 p-8 ml-64">
        <h1 class="text-3xl font-bold text-slate-800 mb-6">ພາບລວມລະບົບ (Dashboard)</h1>
        
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex items-center space-x-4">
                <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-slate-800">ລະບົບເຊື່ອມຕໍ່ສຳເລັດແລ້ວ!</h2>
                    <p class="text-slate-500 mt-1">ຕອນນີ້ທ່ານສາມາດກົດເມນູດ້ານຊ້າຍມື ເພື່ອເຂົ້າຫາໜ້າຕ່າງໆໄດ້ເລີຍ.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- ສູດສຳເລັດ: ດຶງໂຄ້ດ Sidebar -->
    <script src="./js/components/sidebar.js"></script>
</body>
</html>
