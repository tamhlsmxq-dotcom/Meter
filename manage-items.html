<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>ຈັດການສະຕັອກ</title>
</head>
<body class="bg-gray-100 p-6">

    <!-- 1. ຊ່ອງຄົ້ນຫາ (Search Section) -->
    <div class="relative w-full max-w-lg mb-6">
        <label class="block text-sm font-bold text-gray-700 mb-2">ຄົ້ນຫາອຸປະກອນ</label>
        <input type="text" id="itemSearch" 
               placeholder="🔍 ພິມລະຫັດ ຫຼື ຊື່ອຸປະກອນ..." 
               class="w-full p-4 border-2 border-blue-300 rounded-xl focus:border-blue-600 outline-none shadow-sm text-lg">
        
        <!-- Dropdown Box -->
        <div id="dropdownList" class="absolute z-50 w-full mt-2 bg-white border border-gray-200 rounded-xl shadow-2xl hidden max-h-80 overflow-y-auto"></div>
    </div>

    <!-- 2. ຕາຕະລາງ (Table Section) -->
    <table class="w-full bg-white rounded-xl shadow-sm overflow-hidden">
        <thead class="bg-blue-900 text-white">
            <tr>
                <th class="p-4 text-left">ລະຫັດ</th>
                <th class="p-4 text-left">ຊື່ອຸປະກອນ</th>
                <th class="p-4 text-center">ຈຳນວນເຫຼືອ</th>
            </tr>
        </thead>
        <tbody id="inventory-table-body">
            <!-- ຂໍ້ມູນຈະຖືກ Render ຜ່ານ JS -->
        </tbody>
    </table>

    <script type="module" src="manage-items.js"></script>
</body>
</html>
