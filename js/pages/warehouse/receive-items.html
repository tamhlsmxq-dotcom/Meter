<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ຮັບເຄື່ອງເຂົ້າສາງ - Water Meter</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Lao', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 flex min-h-screen">

    <!-- 1. ກ່ອງສຳລັບດຶງ Sidebar ແບບອົງກອນມາສະແດງ (ເອີ້ນມາຈາກ sidebar.js) -->
    <div id="sidebar-container"></div>

    <!-- 2. ພື້ນທີ່ເນື້ອຫາຫຼັກດ້ານຂວາ (Main Content) -->
    <main class="flex-1 p-8 overflow-y-auto w-full">
        <!-- ຫົວຂໍ້ໜ້າ -->
        <div class="mb-8">
            <h2 class="text-2xl font-bold text-slate-800 flex items-center">
                <span class="mr-3 text-3xl">📥</span> ຮັບອຸປະກອນເຂົ້າສາງ (Receive In)
            </h2>
        </div>

        <!-- ກ່ອງແບ່ງຊ້າຍ-ຂວາ (ຟອມ ແລະ ຕາຕະລາງ) -->
        <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">

            <!-- ຝັ່ງຊ້າຍ: ຟອມຮັບເຄື່ອງ -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-bold text-slate-800">ຟອມບັນທຶກຮັບເຄື່ອງເຂົ້າ</h3>
                    <!-- ປຸ່ມລ້າງຂໍ້ມູນໄວ -->
                    <button type="button" id="clearFormBtn" class="px-3 py-1.5 text-xs font-semibold text-rose-500 bg-rose-50 border border-rose-200 rounded-lg hover:bg-rose-100 transition-colors">
                        × ລ້າງຂໍ້ມູນໄວ
                    </button>
                </div>

                <form id="receiveForm" class="space-y-5">
                    <!-- ຊ່ອງຄົ້ນຫາອຸປະກອນ (Dropdown) -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">ພິມລະຫັດ ຫຼື ເລືອກອຸປະກອນ *</label>
                        <div class="relative">
                            <input type="text" id="itemSearch" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all text-sm" placeholder="ພິມລະຫັດ ຫຼື ຊື່ອຸປະກອນ..." autocomplete="off" required>
                            <!-- ລາຍຊື່ອຸປະກອນຈະມາສະແດງໃນກ່ອງນີ້ -->
                            <div id="dropdownList" class="absolute z-10 w-full mt-1 bg-white border border-slate-200 rounded-xl shadow-lg max-h-60 overflow-y-auto hidden"></div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">ຈຳນວນຮັບເຂົ້າ *</label>
                        <input type="number" id="receiveQty" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all text-sm" placeholder="0" min="1" required>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">ໝາຍເຫດ / ແຫຼ່ງທີ່ມາ *</label>
                        <input type="text" id="receiveNote" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all text-sm" placeholder="ເຊັ່ນ: ຊື້ເຂົ້າໃໝ່..." required>
                    </div>

                    <button type="submit" class="w-full mt-2 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-md shadow-blue-500/30 transition-all active:scale-[0.98]">
                        ຢືນຢັນບັນທຶກເຂົ້າສາງ
                    </button>
                </form>
            </div>

            <!-- ຝັ່ງຂວາ: ປະຫວັດການຮັບເຂົ້າ -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col h-full">
                <h3 class="text-lg font-bold text-slate-800 mb-6">ປະຫວັດການຮັບເຄື່ອງເຂົ້າ</h3>
                
                <div class="overflow-x-auto flex-1">
                    <table class="w-full text-sm text-left">
                        <thead class="text-xs text-slate-500 uppercase bg-slate-50 border-b border-slate-200">
                            <tr>
                                <th class="px-4 py-3 font-semibold">ລ/ດ</th>
                                <th class="px-4 py-3 font-semibold text-left">ຊື່ອຸປະກອນ</th>
                                <th class="px-4 py-3 font-semibold text-center">ຈຳນວນ</th>
                                <th class="px-4 py-3 font-semibold text-left">ໝາຍເຫດ/ເວລາ</th>
                            </tr>
                        </thead>
                        <tbody id="receiveHistoryTable" class="divide-y divide-slate-100">
                            <!-- ຂໍ້ມູນຈາກ Firebase ຈະແລ່ນມາສະແດງຢູ່ນີ້ -->
                            <tr>
                                <td colspan="4" class="px-4 py-8 text-center text-slate-400">ກຳລັງໂຫຼດຂໍ້ມູນ...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <!-- 3. ເອີ້ນໃຊ້ໄຟລ໌ Script ຕ່າງໆ -->
    
    <!-- ເອີ້ນໃຊ້ໄຟລ໌ Sidebar ຫຼັກ -->
    <script src="sidebar.js"></script>
    
    <!-- ເອີ້ນໃຊ້ໄຟລ໌ JavaScript ສະເພາະຂອງໜ້າຮັບເຄື່ອງ -->
    <script type="module" src="js/pages/receive-items.js"></script>

</body>
</html>
