<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ເຂົ້າສູ່ລະບົບ - Water Meter System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> 
        * { font-family: 'Times New Roman', 'Phetsarath OT', serif; }
        
        /* ອະນິເມຊັນສະໝຸດ (Smooth Animation) */
        .fade-in { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .slide-in-right { animation: slideInRight 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }

        /* ລວດລາຍ Background ເບື້ອງຊ້າຍ */
        .bg-pattern { background-image: url('data:image/svg+xml,%3Csvg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"%3E%3Cg fill="none" fill-rule="evenodd"%3E%3Cg fill="%23ffffff" fill-opacity="0.08"%3E%3Cpath d="M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z"/%3E%3C/g%3E%3C/g%3E%3C/svg%3E'); }
    </style>
</head>
<body class="min-h-screen bg-slate-50 flex overflow-hidden">

    <!-- 🟢 ເບື້ອງຊ້າຍ: ກຣາຟິກ ແລະ ໂລໂກ້ (ສະແດງສະເພາະຈໍໃຫຍ່) 🟢 -->
    <div class="hidden lg:flex lg:w-1/2 bg-gradient-to-br from-indigo-700 via-blue-600 to-indigo-900 relative items-center justify-center bg-pattern">
        <!-- ແສງສະທ້ອນ (Glow Effect) -->
        <div class="absolute top-0 left-0 w-full h-full overflow-hidden opacity-50">
            <div class="absolute -top-24 -left-24 w-96 h-96 bg-blue-400 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse"></div>
            <div class="absolute bottom-10 right-10 w-72 h-72 bg-indigo-400 rounded-full mix-blend-multiply filter blur-3xl opacity-30"></div>
        </div>

        <div class="relative z-10 text-center text-white px-12 slide-in-right">
            <div class="w-24 h-24 bg-white/10 backdrop-blur-md rounded-3xl mx-auto flex items-center justify-center border border-white/20 shadow-2xl mb-8">
                <div class="w-16 h-16 bg-gradient-to-br from-blue-400 to-indigo-500 rounded-2xl flex items-center justify-center text-white font-bold text-3xl shadow-inner">W</div>
            </div>
            <h1 class="text-4xl font-extrabold tracking-wide mb-4">Water<span class="text-blue-300">Meter</span> System</h1>
            <p class="text-indigo-100 text-lg leading-relaxed max-w-md mx-auto">
                ລະບົບຄຸ້ມຄອງສະຕັອກ ແລະ ບໍລິຫານຈັດການໃບງານທີມຊ່າງພາກສະໜາມ ລະດັບອົງກອນ.
            </p>
        </div>
        
        <!-- ສ່ວນທ້າຍເບື້ອງຊ້າຍ -->
        <div class="absolute bottom-8 text-indigo-200/60 text-sm">
            &copy; 2026 Water Meter Enterprise. All rights reserved.
        </div>
    </div>

    <!-- 🟢 ເບື້ອງຂວາ: ຟອມເຂົ້າສູ່ລະບົບ (Login Form) 🟢 -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8 sm:p-12 lg:p-24 bg-white relative">
        <div class="w-full max-w-md space-y-8 fade-in">
            
            <!-- ໂລໂກ້ສຳລັບຈໍນ້ອຍ (ມືຖື) -->
            <div class="lg:hidden text-center mb-10">
                <div class="w-16 h-16 bg-gradient-to-br from-indigo-500 to-blue-600 rounded-2xl mx-auto flex items-center justify-center text-white font-bold text-2xl shadow-lg mb-4">W</div>
                <h2 class="text-2xl font-extrabold text-slate-800">WaterMeter</h2>
            </div>

            <div>
                <h2 class="text-3xl font-extrabold text-slate-800 tracking-tight">ຍິນດີຕ້ອນຮັບ,</h2>
                <p class="text-slate-500 mt-2 text-sm font-medium">ກະລຸນາປ້ອນຂໍ້ມູນເຂົ້າສູ່ລະບົບຂອງທ່ານເພື່ອດຳເນີນການຕໍ່</p>
            </div>

            <form class="mt-8 space-y-6" onsubmit="handleLogin(event)">
                <div class="space-y-5">
                    <!-- ຊ່ອງອີເມວ / ຊື່ຜູ້ໃຊ້ -->
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1.5">ຊື່ຜູ້ໃຊ້ ຫຼື ອີເມວ</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                                <svg class="h-5 w-5 text-slate-400 group-focus-within:text-indigo-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                </svg>
                            </div>
                            <input type="text" id="username" required class="block w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all hover:bg-white" placeholder="admin@watermeter.la">
                        </div>
                    </div>

                    <!-- ຊ່ອງລະຫັດຜ່ານ -->
                    <div>
                        <div class="flex items-center justify-between mb-1.5">
                            <label class="block text-sm font-bold text-slate-700">ລະຫັດຜ່ານ</label>
                            <a href="#" class="text-xs font-bold text-indigo-600 hover:text-indigo-500 transition-colors">ລືມລະຫັດຜ່ານ?</a>
                        </div>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                                <svg class="h-5 w-5 text-slate-400 group-focus-within:text-indigo-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                </svg>
                            </div>
                            <input type="password" id="password" required class="block w-full pl-11 pr-11 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all hover:bg-white" placeholder="••••••••">
                            <div class="absolute inset-y-0 right-0 pr-3.5 flex items-center cursor-pointer" onclick="togglePassword()">
                                <svg id="eyeIcon" class="h-5 w-5 text-slate-400 hover:text-slate-600 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ຈື່ຂ້ອຍໄວ້ -->
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-slate-300 rounded cursor-pointer">
                    <label for="remember-me" class="ml-2 block text-sm text-slate-600 cursor-pointer select-none">
                        ຈື່ຂ້ອຍໄວ້ໃນລະບົບ (Remember me)
                    </label>
                </div>

                <!-- ປຸ່ມເຂົ້າສູ່ລະບົບ -->
                <div>
                    <button type="submit" id="loginBtn" class="w-full flex justify-center items-center py-3.5 px-4 border border-transparent rounded-xl shadow-lg shadow-indigo-500/30 text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 active:scale-[0.98] transition-all duration-200">
                        ເຂົ້າສູ່ລະບົບ (Login)
                        <svg class="ml-2 -mr-1 w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </button>
                </div>
            </form>
            
        </div>
    </div>

    <!-- 🟢 Scripts 🟢 -->
    <script>
        // ຟັງຊັນເປີດ/ປິດ ການເບິ່ງເຫັນລະຫັດຜ່ານ
        function togglePassword() {
            const pwdInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />`;
            } else {
                pwdInput.type = 'password';
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />`;
            }
        }

        // ຟັງຊັນຈຳລອງການ Login (ຖ້າສຳເລັດໃຫ້ Redirect ໄປໜ້າ index.html)
        function handleLogin(event) {
            event.preventDefault(); // ປ້ອງກັນບໍ່ໃຫ້ຟອມຣີເຟຣຊໜ້າເວັບ
            
            const btn = document.getElementById('loginBtn');
            const originalHTML = btn.innerHTML;
            
            // ປ່ຽນປຸ່ມເປັນສະຖານະ Loading
            btn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> ກຳລັງກວດສອບ...`;
            btn.classList.add('opacity-75', 'cursor-not-allowed');
            
            // ຈຳລອງການໂຫຼດຂໍ້ມູນ 1 ວິນາທີ ແລ້ວເຂົ້າສູ່ໜ້າ Dashboard
            setTimeout(() => {
                window.location.href = "index.html";
            }, 1000);
        }
    </script>
</body>
</html>
